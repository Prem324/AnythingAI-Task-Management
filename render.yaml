services:
  - type: web
    name: taskmaster-api
    env: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    domains:
      - taskmaster-api.onrender.com
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: MONGO_URI
        scope: build
        sync: false
      - key: JWT_SECRET
        scope: build
        sync: false
      - key: JWT_EXPIRE
        value: 1h
      - key: JWT_COOKIE_EXPIRE
        value: "30"
      - key: CORS_ORIGIN
        value: "http://localhost:3000,http://localhost:3001,https://anthing-ai-assignment.vercel.app"
